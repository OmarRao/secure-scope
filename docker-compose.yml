version: "3.9"
services:
  secscope:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}
    volumes:
      - ./reports:/app/reports
      - ./secscope.db:/app/secscope.db
    command: --webhook --port 8080 --use-db --db-path /app/secscope.db --out-dir /app/reports
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
