replicaCount: 2

image:
  repository: ghcr.io/omarrao/secure-scope
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

env:
  GITHUB_TOKEN: ""
  ANTHROPIC_API_KEY: ""
  SLACK_WEBHOOK: ""
  OUT_DIR: "/app/reports"
  DB_PATH: "/app/secscope.db"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
