apiVersion: v1
kind: Service
metadata:
  name: {{ include "secscope.fullname" . }}
  labels:
    {{- include "secscope.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "secscope.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
