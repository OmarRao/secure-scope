rules:
  - id: hardcoded-aws-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: >
      Hardcoded AWS Access Key ID detected (AKIA...). AWS credentials must
      never be committed to source control. Rotate the key immediately and
      use IAM roles, AWS Secrets Manager, or environment variables instead.
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: CWE-798
      owasp: "A02:2021 - Cryptographic Failures"
      category: security

  - id: hardcoded-github-token
    pattern-regex: 'ghp_[a-zA-Z0-9]{36}'
    message: >
      Hardcoded GitHub Personal Access Token (ghp_...) detected. Revoke this
      token immediately on github.com/settings/tokens and use GitHub Secrets
      or environment variables.
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: CWE-798
      owasp: "A02:2021 - Cryptographic Failures"
      category: security

  - id: hardcoded-jwt-secret
    pattern-either:
      - pattern: |
          SECRET_KEY = "..."
      - pattern: |
          JWT_SECRET = "..."
      - pattern: |
          JWT_SECRET_KEY = "..."
    message: >
      Hardcoded JWT or application secret key detected. Short or predictable
      secret keys allow attackers to forge tokens. Load secrets from environment
      variables or a secrets manager.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: CWE-798
      owasp: "A02:2021 - Cryptographic Failures"
      category: security

  - id: hardcoded-database-url
    pattern-either:
      - pattern: |
          DATABASE_URL = "postgresql://$USER:$PASS@..."
      - pattern: |
          DATABASE_URL = "mysql://$USER:$PASS@..."
      - pattern: |
          DATABASE_URL = "mongodb+srv://$USER:$PASS@..."
      - pattern: |
          SQLALCHEMY_DATABASE_URI = "...$PASS..."
    message: >
      Database connection URL with embedded credentials detected. Never hardcode
      database passwords in source code. Use environment variables or a secrets
      manager (e.g., AWS Secrets Manager, HashiCorp Vault).
    severity: ERROR
    languages: [python]
    metadata:
      cwe: CWE-798
      owasp: "A02:2021 - Cryptographic Failures"
      category: security
