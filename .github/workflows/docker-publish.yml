# ════════════════════════════════════════════════════════════════════════════
# Docker Publish — SecureScope
#
# Builds the SecureScope Docker image and pushes it to the
# GitHub Container Registry (GHCR) at:
#   ghcr.io/omarrao/secure-scope
#
# Triggers
# ────────
#   • Push to main          → tags: latest, sha-<short>
#   • Release published     → tags: latest, vX.Y.Z, sha-<short>
#   • Workflow dispatch     → manual trigger from the Actions tab
#
# Image is built for linux/amd64 and linux/arm64 (Apple Silicon / AWS Graviton).
#
# No secrets to configure — uses the built-in GITHUB_TOKEN which has
# write permission to GHCR for this repository automatically.
# ════════════════════════════════════════════════════════════════════════════

name: Docker — Build & Publish

on:
  push:
    branches:
      - main
    # Only rebuild when source files change — skip pure-docs pushes
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "SECURITY.md"

  release:
    # Triggered when a GitHub Release is published (e.g. v2.0.0)
    types:
      - published

  # Allow manual runs from the Actions tab for debugging or forced rebuilds
  workflow_dispatch:

# Global permissions — restrict to what this workflow actually needs
permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # needed by docker/login-action for OIDC (future-proof)

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── 2. Set up QEMU for multi-platform builds ─────────────────────────
      # QEMU provides emulation so the amd64 runner can build arm64 images.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      # ── 3. Set up Docker Buildx ──────────────────────────────────────────
      # Buildx is the extended Docker CLI plugin that supports multi-platform
      # builds, better caching, and BuildKit features.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # ── 4. Log in to GitHub Container Registry ───────────────────────────
      # Uses the built-in GITHUB_TOKEN — no manual secret needed.
      # The token has write permission to GHCR for this repository.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract image metadata and generate tags ──────────────────────
      # docker/metadata-action reads the Git context (branch, tag, SHA) and
      # produces a set of image tags and OCI labels automatically:
      #
      #   On push to main:
      #     ghcr.io/omarrao/secure-scope:latest
      #     ghcr.io/omarrao/secure-scope:main
      #     ghcr.io/omarrao/secure-scope:sha-abc1234
      #
      #   On release (tag v2.0.0):
      #     ghcr.io/omarrao/secure-scope:latest
      #     ghcr.io/omarrao/secure-scope:v2.0.0
      #     ghcr.io/omarrao/secure-scope:2.0.0
      #     ghcr.io/omarrao/secure-scope:2.0
      #     ghcr.io/omarrao/secure-scope:sha-abc1234
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/secure-scope
          tags: |
            # Branch push → :main + :latest
            type=ref,event=branch
            # Release tag → :vX.Y.Z, :X.Y.Z, :X.Y (semver)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always include a short SHA tag for traceability
            type=sha,prefix=sha-,format=short
            # latest on default branch and releases only
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=SecureScope
            org.opencontainers.image.description=AI-powered security analysis for any GitHub repository — MITRE ATT&CK mapping, ransomware detection, YARA scanning, multi-LLM fix advisor.
            org.opencontainers.image.vendor=Omar Rao
            org.opencontainers.image.licenses=MIT

      # ── 6. Build and push ────────────────────────────────────────────────
      # Builds for both amd64 (standard cloud VMs) and arm64 (Apple Silicon,
      # AWS Graviton, Raspberry Pi). The GitHub Actions cache is used to speed
      # up subsequent builds by reusing unchanged layers.
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          # Build for Intel/AMD and ARM — covers all major deployment targets
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass the git SHA as a build arg for runtime version display
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}

      # ── 7. Print image digest ────────────────────────────────────────────
      # The digest is the immutable sha256 reference — useful for pinning in
      # Kubernetes manifests or docker-compose for reproducible deployments.
      - name: Print image digest
        env:
          IMAGE_DIGEST: ${{ steps.build-and-push.outputs.digest }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Image digest: ${IMAGE_DIGEST}"
          echo ""
          echo "Pull commands:"
          echo "  docker pull ghcr.io/omarrao/secure-scope:latest"
          echo "  docker pull ghcr.io/omarrao/secure-scope:${REF_NAME}"
