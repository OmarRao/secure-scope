name: SecureScope Self-Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secscope:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required for upload-sarif
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install semgrep pip-audit requests detect-secrets

      - name: Run SecureScope
        run: |
          python main.py \
            --repo https://github.com/${{ github.repository }} \
            --no-advisor \
            --no-sandbox \
            --sarif \
            --sbom \
            --compliance \
            --secret-scan \
            --out-dir ./secscope-reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: ./secscope-reports/

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: secscope-sbom
          path: ./secscope-reports/*.sbom.cyclonedx.json
          retention-days: 90

      - name: Upload full reports as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: secscope-reports
          path: ./secscope-reports/
          retention-days: 30
