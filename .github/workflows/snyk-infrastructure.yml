# ────────────────────────────────────────────────────────────────────────────
# Snyk Security Scan — SecureScope
#
# Scans Python dependencies (requirements.txt) for known CVEs using Snyk,
# then uploads the SARIF report to GitHub Code Scanning.
#
# Triggers: push/PR to main + weekly schedule (Thursday 17:24 UTC).
#
# Prerequisites — add these secrets in:
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#
#   SNYK_TOKEN   Your Snyk API token (free at https://snyk.io/login)
#
# CodeQL upload action pinned to v4 (v3 is deprecated December 2026).
# ────────────────────────────────────────────────────────────────────────────

name: Snyk Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly scan — Thursday at 17:24 UTC (keep staggered from CodeQL Sunday run)
    - cron: "24 17 * * 4"

permissions:
  contents: read

jobs:
  snyk:
    name: Snyk Python Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read         # checkout
      security-events: write # upload SARIF to GitHub Security tab
      actions: read          # required for private repos to read Action run status

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      # Snyk's Python action requires a working Python + pip environment
      # so it can resolve the full dependency graph from requirements.txt.
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────────────────
      # Install project dependencies so Snyk can resolve the full graph.
      # Use --dry-run here if you only want graph resolution without side effects;
      # for accurate results we install properly.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Run Snyk Python scan ────────────────────────────────────────
      # Uses snyk/actions/python (not /iac — this project has no Terraform,
      # Helm, or Kubernetes files).
      #
      # continue-on-error: true — allows the workflow to proceed to the SARIF
      # upload step even when Snyk finds vulnerabilities (exit code 1) or
      # encounters a non-fatal error. The SARIF file is still written in
      # those cases and the findings will appear in GitHub Code Scanning.
      #
      # SNYK_TOKEN must be set as a repository secret:
      #   Settings → Secrets and variables → Actions → SNYK_TOKEN
      - name: Run Snyk to check dependencies for vulnerabilities
        continue-on-error: true
        uses: snyk/actions/python@8e119fbb6c251787721d34ba683ed48eba792766 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Output a SARIF file so results appear in GitHub Security tab.
          # The file is named snyk.sarif by convention.
          args: --sarif-file-output=snyk.sarif

      # ── 5. Upload SARIF to GitHub Code Scanning ────────────────────────
      # Runs unconditionally (if: always()) so the upload step executes
      # even when the Snyk step above exits with a non-zero code.
      # The file-existence check prevents a hard failure if Snyk failed
      # to produce the SARIF file (e.g. missing SNYK_TOKEN secret).
      #
      # github/codeql-action/upload-sarif pinned to v4.
      # (v3 is deprecated and will stop working December 2026.)
      - name: Upload Snyk SARIF results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif
