apiVersion: apps/v1
kind: Deployment
metadata:
  name: secscope
  labels:
    app: secscope
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secscope
  template:
    metadata:
      labels:
        app: secscope
    spec:
      containers:
        - name: secscope
          image: ghcr.io/omarrao/secure-scope:latest
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secscope-secrets
                  key: github-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: secscope-secrets
                  key: anthropic-api-key
            - name: SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: secscope-secrets
                  key: slack-webhook
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
