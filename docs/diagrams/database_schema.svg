<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">SecureScope — SQLite Database Schema</text>

  <!-- scans table -->
  <rect x="30" y="45" width="185" height="230" rx="6" fill="white" stroke="#546e7a" stroke-width="1.5"/>
  <rect x="30" y="45" width="185" height="28" rx="6" fill="#546e7a"/>
  <text x="122" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">scans</text>
  <text x="40" y="90" font-size="11" fill="#333">🔑 id INTEGER PK</text>
  <text x="40" y="108" font-size="11" fill="#555">repo_url TEXT NOT NULL</text>
  <text x="40" y="126" font-size="11" fill="#555">branch TEXT</text>
  <text x="40" y="144" font-size="11" fill="#555">scan_date TEXT</text>
  <text x="40" y="162" font-size="11" fill="#555">total_findings INTEGER</text>
  <text x="40" y="180" font-size="11" fill="#555">critical_count INTEGER</text>
  <text x="40" y="198" font-size="11" fill="#555">high_count INTEGER</text>
  <text x="40" y="216" font-size="11" fill="#555">medium_count INTEGER</text>
  <text x="40" y="234" font-size="11" fill="#555">low_count INTEGER</text>
  <text x="40" y="252" font-size="11" fill="#555">duration_seconds REAL</text>
  <text x="40" y="268" font-size="11" fill="#555">report_path TEXT</text>

  <!-- findings table -->
  <rect x="265" y="45" width="185" height="270" rx="6" fill="white" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="265" y="45" width="185" height="28" rx="6" fill="#1565c0"/>
  <text x="357" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">findings</text>
  <text x="275" y="90" font-size="11" fill="#333">🔑 id INTEGER PK</text>
  <text x="275" y="108" font-size="11" fill="#b71c1c">🔗 scan_id INTEGER FK</text>
  <text x="275" y="126" font-size="11" fill="#555">rule_id TEXT</text>
  <text x="275" y="144" font-size="11" fill="#555">severity TEXT</text>
  <text x="275" y="162" font-size="11" fill="#555">file_path TEXT</text>
  <text x="275" y="180" font-size="11" fill="#555">line_start INTEGER</text>
  <text x="275" y="198" font-size="11" fill="#555">line_end INTEGER</text>
  <text x="275" y="216" font-size="11" fill="#555">message TEXT</text>
  <text x="275" y="234" font-size="11" fill="#555">cwe TEXT</text>
  <text x="275" y="252" font-size="11" fill="#555">attack_technique TEXT</text>
  <text x="275" y="270" font-size="11" fill="#555">fix_suggestion TEXT</text>
  <text x="275" y="288" font-size="11" fill="#555">suppressed INTEGER</text>
  <text x="275" y="306" font-size="11" fill="#555">scanner TEXT</text>

  <!-- sla_tracking table -->
  <rect x="500" y="45" width="185" height="230" rx="6" fill="white" stroke="#e65100" stroke-width="1.5"/>
  <rect x="500" y="45" width="185" height="28" rx="6" fill="#e65100"/>
  <text x="592" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">sla_tracking</text>
  <text x="510" y="90" font-size="11" fill="#333">🔑 id INTEGER PK</text>
  <text x="510" y="108" font-size="11" fill="#b71c1c">🔗 finding_id INTEGER FK</text>
  <text x="510" y="126" font-size="11" fill="#555">rule_id TEXT</text>
  <text x="510" y="144" font-size="11" fill="#555">severity TEXT</text>
  <text x="510" y="162" font-size="11" fill="#555">first_seen TEXT</text>
  <text x="510" y="180" font-size="11" fill="#555">last_seen TEXT</text>
  <text x="510" y="198" font-size="11" fill="#555">days_open INTEGER</text>
  <text x="510" y="216" font-size="11" fill="#555">sla_deadline TEXT</text>
  <text x="510" y="234" font-size="11" fill="#555">breached INTEGER</text>
  <text x="510" y="252" font-size="11" fill="#555">alerted INTEGER</text>

  <!-- Relationship: scans → findings (1:N) -->
  <line x1="215" y1="108" x2="265" y2="108" stroke="#b71c1c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="225" y="103" font-size="9" fill="#b71c1c">1</text>
  <text x="248" y="103" font-size="9" fill="#b71c1c">N</text>

  <!-- Relationship: findings → sla_tracking (1:1) -->
  <line x1="450" y1="108" x2="500" y2="108" stroke="#b71c1c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="103" font-size="9" fill="#b71c1c">1</text>
  <text x="483" y="103" font-size="9" fill="#b71c1c">1</text>

  <!-- Notes -->
  <rect x="30" y="295" width="450" height="90" rx="6" fill="#f5f5f5" stroke="#ccc"/>
  <text x="45" y="315" font-size="11" font-weight="bold" fill="#333">Schema Notes</text>
  <text x="45" y="333" font-size="10" fill="#555">• All TEXT dates stored as ISO 8601: YYYY-MM-DDTHH:MM:SS</text>
  <text x="45" y="349" font-size="10" fill="#555">• scan_id references scans.id (ON DELETE CASCADE)</text>
  <text x="45" y="365" font-size="10" fill="#555">• finding_id references findings.id (ON DELETE CASCADE)</text>
  <text x="45" y="381" font-size="10" fill="#555">• suppressed=1 means finding hidden from active counts; breached=1 triggers Slack alert</text>
</svg>
