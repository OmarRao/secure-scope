<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">SecureScope — CI/CD Integration Flow</text>

  <!-- Developer -->
  <rect x="20" y="55" width="120" height="50" rx="6" fill="#455a64" filter="url(#shadow)"/>
  <text x="80" y="76" text-anchor="middle" font-size="12" fill="white">Developer</text>
  <text x="80" y="92" text-anchor="middle" font-size="10" fill="#cfd8dc">git push / PR</text>
  <line x1="140" y1="80" x2="195" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- GitHub -->
  <rect x="195" y="55" width="120" height="50" rx="6" fill="#24292e" filter="url(#shadow)"/>
  <text x="255" y="76" text-anchor="middle" font-size="12" fill="white">GitHub</text>
  <text x="255" y="92" text-anchor="middle" font-size="10" fill="#8b949e">Actions trigger</text>

  <!-- Arrow down to SecureScope -->
  <line x1="255" y1="105" x2="255" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="135" font-size="10" fill="#555">CI workflow</text>

  <!-- SecureScope -->
  <rect x="165" y="155" width="180" height="60" rx="6" fill="#4a148c" filter="url(#shadow)"/>
  <text x="255" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SecureScope</text>
  <text x="255" y="196" text-anchor="middle" font-size="10" fill="#e1bee7">SAST · SCA · Secrets · IaC</text>
  <text x="255" y="210" text-anchor="middle" font-size="10" fill="#e1bee7">Container · DAST</text>

  <!-- Arrow right to SARIF -->
  <line x1="345" y1="185" x2="410" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="360" y="178" font-size="10" fill="#555">--sarif</text>

  <!-- SARIF -->
  <rect x="410" y="160" width="130" height="50" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="475" y="181" text-anchor="middle" font-size="12" fill="white">SARIF 2.1.0</text>
  <text x="475" y="197" text-anchor="middle" font-size="10" fill="#c8e6c9">results.sarif</text>

  <!-- Arrow up to Code Scanning -->
  <line x1="475" y1="160" x2="475" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="485" y="140" font-size="10" fill="#555">upload-sarif</text>

  <!-- GitHub Code Scanning -->
  <rect x="395" y="55" width="160" height="50" rx="6" fill="#1976d2" filter="url(#shadow)"/>
  <text x="475" y="76" text-anchor="middle" font-size="12" fill="white">GitHub Code</text>
  <text x="475" y="92" text-anchor="middle" font-size="10" fill="#bbdefb">Scanning → Alerts</text>

  <!-- Arrow: High findings → Jira -->
  <line x1="255" y1="215" x2="255" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="248" font-size="10" fill="#c62828">CRITICAL/HIGH</text>

  <!-- Jira -->
  <rect x="165" y="265" width="130" height="45" rx="6" fill="#0052cc" filter="url(#shadow)"/>
  <text x="230" y="285" text-anchor="middle" font-size="12" fill="white">Jira Cloud</text>
  <text x="230" y="300" text-anchor="middle" font-size="10" fill="#bcd4f0">AUTO ticket</text>

  <!-- Arrow: Slack -->
  <line x1="295" y1="288" x2="360" y2="288" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="360" y="265" width="130" height="45" rx="6" fill="#4a154b" filter="url(#shadow)"/>
  <text x="425" y="285" text-anchor="middle" font-size="12" fill="white">Slack</text>
  <text x="425" y="300" text-anchor="middle" font-size="10" fill="#e8d5e8">Alert webhook</text>

  <!-- PR Comment -->
  <line x1="255" y1="310" x2="255" y2="355" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="165" y="355" width="180" height="45" rx="6" fill="#546e7a" filter="url(#shadow)"/>
  <text x="255" y="375" text-anchor="middle" font-size="12" fill="white">PR Comment</text>
  <text x="255" y="390" text-anchor="middle" font-size="10" fill="#cfd8dc">Markdown summary</text>

  <!-- SQLite trend -->
  <line x1="345" y1="370" x2="420" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="355" width="140" height="45" rx="6" fill="#6a1b9a" filter="url(#shadow)"/>
  <text x="490" y="375" text-anchor="middle" font-size="12" fill="white">SQLite DB</text>
  <text x="490" y="390" text-anchor="middle" font-size="10" fill="#e1bee7">Trend + SLA tracking</text>

  <!-- Gate: fail if CRITICAL -->
  <line x1="255" y1="400" x2="255" y2="445" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="155" y="445" width="200" height="40" rx="6" fill="#b71c1c" filter="url(#shadow)"/>
  <text x="255" y="462" text-anchor="middle" font-size="12" fill="white">Exit 1 if CRITICAL found</text>
  <text x="255" y="478" text-anchor="middle" font-size="10" fill="#ffcdd2">(--fail-on CRITICAL)</text>

  <!-- Pass gate -->
  <line x1="490" y1="400" x2="490" y2="445" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="415" y="445" width="150" height="40" rx="6" fill="#1b5e20" filter="url(#shadow)"/>
  <text x="490" y="462" text-anchor="middle" font-size="12" fill="white">Exit 0 — Pass</text>
  <text x="490" y="478" text-anchor="middle" font-size="10" fill="#c8e6c9">Merge allowed</text>
</svg>
