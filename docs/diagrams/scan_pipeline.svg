<svg viewBox="0 0 700 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">SecureScope — Scan Pipeline</text>

  <!-- Start -->
  <ellipse cx="350" cy="55" rx="50" ry="20" fill="#37474f"/>
  <text x="350" y="60" text-anchor="middle" font-size="12" fill="white" font-weight="bold">START</text>
  <line x1="350" y1="75" x2="350" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Clone Repo -->
  <rect x="230" y="95" width="240" height="35" rx="6" fill="#1565c0"/>
  <text x="350" y="117" text-anchor="middle" font-size="12" fill="white">Clone Repo (depth=1)</text>
  <line x1="350" y1="130" x2="350" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Detect Project Type -->
  <rect x="230" y="150" width="240" height="35" rx="6" fill="#1565c0"/>
  <text x="350" y="172" text-anchor="middle" font-size="12" fill="white">Detect Project Type</text>
  <line x1="350" y1="185" x2="350" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: requirements.txt? -->
  <polygon points="350,205 450,230 350,255 250,230" fill="#f9a825"/>
  <text x="350" y="228" text-anchor="middle" font-size="10" fill="#333">requirements.txt?</text>
  <text x="350" y="242" text-anchor="middle" font-size="9" fill="#333">Cargo.toml / go.mod?</text>
  <!-- Yes -->
  <line x1="350" y1="255" x2="350" y2="275" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="357" y="269" font-size="10" fill="#2e7d32">Yes</text>

  <!-- Python ecosystem -->
  <rect x="260" y="275" width="180" height="30" rx="5" fill="#4caf50"/>
  <text x="350" y="295" text-anchor="middle" font-size="11" fill="white">Python / Node / Go / Rust</text>
  <line x1="350" y1="305" x2="350" y2="325" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Run SAST -->
  <rect x="230" y="325" width="240" height="35" rx="6" fill="#1565c0"/>
  <text x="350" y="347" text-anchor="middle" font-size="12" fill="white">Run SAST (Semgrep)</text>
  <line x1="350" y1="360" x2="350" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: secret-scan? -->
  <polygon points="350,380 450,400 350,420 250,400" fill="#f9a825"/>
  <text x="350" y="404" text-anchor="middle" font-size="10" fill="#333">--secret-scan?</text>
  <line x1="450" y1="400" x2="560" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="395" font-size="10" fill="#2e7d32">Yes</text>
  <rect x="560" y="385" width="120" height="30" rx="5" fill="#c62828"/>
  <text x="620" y="405" text-anchor="middle" font-size="10" fill="white">detect-secrets</text>
  <line x1="350" y1="420" x2="350" y2="440" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="357" y="435" font-size="10" fill="#777">No/Done</text>

  <!-- Decision: iac-scan? -->
  <polygon points="350,440 450,460 350,480 250,460" fill="#f9a825"/>
  <text x="350" y="464" text-anchor="middle" font-size="10" fill="#333">--iac-scan?</text>
  <line x1="450" y1="460" x2="560" y2="460" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="455" font-size="10" fill="#2e7d32">Yes</text>
  <rect x="560" y="445" width="120" height="30" rx="5" fill="#283593"/>
  <text x="620" y="465" text-anchor="middle" font-size="10" fill="white">Checkov (IaC)</text>
  <line x1="350" y1="480" x2="350" y2="500" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: polyglot? -->
  <polygon points="350,500 450,520 350,540 250,520" fill="#f9a825"/>
  <text x="350" y="524" text-anchor="middle" font-size="10" fill="#333">--polyglot?</text>
  <line x1="450" y1="520" x2="560" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="515" font-size="10" fill="#2e7d32">Yes</text>
  <rect x="560" y="505" width="120" height="30" rx="5" fill="#00695c"/>
  <text x="620" y="525" text-anchor="middle" font-size="10" fill="white">npm/cargo/go/gem</text>
  <line x1="350" y1="540" x2="350" y2="560" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: trivy? -->
  <polygon points="350,560 450,580 350,600 250,580" fill="#f9a825"/>
  <text x="350" y="584" text-anchor="middle" font-size="10" fill="#333">--trivy?</text>
  <line x1="450" y1="580" x2="560" y2="580" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="575" font-size="10" fill="#2e7d32">Yes</text>
  <rect x="560" y="565" width="120" height="30" rx="5" fill="#e65100"/>
  <text x="620" y="585" text-anchor="middle" font-size="10" fill="white">Trivy (Container)</text>
  <line x1="350" y1="600" x2="350" y2="620" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Merge findings -->
  <rect x="230" y="620" width="240" height="35" rx="6" fill="#4a148c"/>
  <text x="350" y="642" text-anchor="middle" font-size="12" fill="white">Merge &amp; Deduplicate Findings</text>
  <line x1="350" y1="655" x2="350" y2="675" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AI Advisor -->
  <rect x="230" y="675" width="240" height="35" rx="6" fill="#1b5e20"/>
  <text x="350" y="697" text-anchor="middle" font-size="12" fill="white">AI Advisor (if not --no-advisor)</text>
  <line x1="350" y1="710" x2="350" y2="730" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Generate Reports -->
  <rect x="230" y="730" width="240" height="35" rx="6" fill="#0277bd"/>
  <text x="350" y="752" text-anchor="middle" font-size="12" fill="white">Generate Reports + Integrations</text>
  <line x1="350" y1="765" x2="350" y2="780" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Done -->
  <ellipse cx="350" cy="790" rx="50" ry="18" fill="#37474f"/>
  <text x="350" y="795" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DONE</text>

  <!-- Legend -->
  <rect x="10" y="10" width="100" height="75" rx="4" fill="#f9f9f9" stroke="#ccc"/>
  <text x="60" y="25" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Legend</text>
  <rect x="15" y="30" width="12" height="10" fill="#1565c0"/>
  <text x="32" y="40" font-size="9" fill="#555">Process</text>
  <polygon points="60,52 75,60 60,68 45,60" fill="#f9a825"/>
  <text x="80" y="64" font-size="9" fill="#555">Decision</text>
  <rect x="15" y="70" width="12" height="10" fill="#4caf50"/>
  <text x="32" y="80" font-size="9" fill="#555">Output</text>
</svg>
