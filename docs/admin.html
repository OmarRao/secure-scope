<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureScope — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0a0c0f;--ink2:#111419;--ink3:#181c23;--rule:#252b35;--rule2:#2e3540;--muted:#6b7785;--dim:#6b7785;--sub:#a0aec0;--body:#e2e8f0;--head:#fff;--accent:#4f8ef7;--danger:#f25757;--warn:#e6a817;--ok:#3ecf79;--grid:rgba(255,255,255,.06)}
    html.light{--ink:#f4f6f9;--ink2:#ffffff;--ink3:#eef1f5;--rule:#d5dae4;--rule2:#c4cad6;--muted:#7a8494;--dim:#5e6878;--sub:#3d4756;--body:#1a2030;--head:#000000;--accent:#2563eb;--warn:#b45309;--ok:#0d9488;--grid:rgba(20,40,80,.07)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--ink);color:var(--body);font-family:'Geist',sans-serif;min-height:100vh;line-height:1.6}
    a{color:var(--accent);text-decoration:none}
    .top{height:52px;border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 24px;gap:12px}
    .wm{font-size:15px;font-weight:700;color:var(--head)} .wm sup{font-size:9px;color:var(--accent);vertical-align:top}
    .badge{font-size:10px;font-family:'Geist Mono',monospace;color:var(--warn);border:1px solid var(--warn);border-radius:6px;padding:3px 8px;text-transform:uppercase;letter-spacing:.6px}
    .spacer{flex:1}
    .btn{background:transparent;border:1px solid var(--rule2);color:var(--sub);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit}
    .btn:hover{border-color:var(--accent);color:var(--head)}
    .wrap{max-width:1160px;margin:0 auto;padding:32px 24px}
    h1{font-size:24px;font-weight:900;color:var(--head);margin-bottom:4px;letter-spacing:-.4px}
    .lead{font-size:14px;color:var(--sub);margin-bottom:22px}
    .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
    .stat{background:var(--ink2);border:1px solid var(--rule);border-radius:12px;padding:16px}
    .stat .n{font-size:26px;font-weight:800;font-family:'Geist Mono',monospace;color:var(--head);line-height:1}
    .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
    .charts{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:8px}
    .card{background:var(--ink2);border:1px solid var(--rule);border-radius:12px;padding:16px 18px;min-width:0}
    .charts>*{min-width:0}
    .card .h{font-size:11px;font-family:'Geist Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
    .bars{display:flex;align-items:flex-end;gap:6px;height:120px;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin;scrollbar-color:var(--rule2) transparent}
    .bars::-webkit-scrollbar{height:6px}
    .bars::-webkit-scrollbar-thumb{background:var(--rule2);border-radius:999px}
    .bar{flex:1 0 20px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px;min-width:20px}
    .bar .b{width:100%;max-width:26px;background:var(--accent);border-radius:4px 4px 0 0;transition:height .3s}
    .bar .bl{font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace;white-space:nowrap}
    .bar .bv{font-size:10px;color:var(--sub);font-family:'Geist Mono',monospace}
    .tbar{display:flex;flex-direction:column;gap:10px}
    .tbar-row{display:grid;grid-template-columns:78px 1fr 32px;gap:8px;align-items:center;font-size:12px}
    .tbar-track{height:10px;background:var(--ink3);border-radius:99px;overflow:hidden}
    .tbar-fill{height:100%;background:var(--accent);border-radius:99px}
    .sec{font-size:11px;font-family:'Geist Mono',monospace;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin:24px 0 10px}
    .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
    .filters input,.filters select{background:var(--ink2);border:1px solid var(--rule2);color:var(--body);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit}
    .filters input{min-width:220px;flex:1}
    .filters .count{font-size:12px;color:var(--muted);font-family:'Geist Mono',monospace}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--rule2) transparent}
    table{width:100%;border-collapse:collapse;background:var(--ink2);border:1px solid var(--rule);border-radius:12px;overflow:hidden}
    th{text-align:left;font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;background:var(--ink3);border-bottom:1px solid var(--rule)}
    td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--rule);color:var(--body)}
    tr:last-child td{border-bottom:none}
    .mono{font-family:'Geist Mono',monospace;font-size:12px}
    .gate{max-width:420px;margin:80px auto;text-align:center}
    .gate h2{color:var(--head);font-size:20px;margin-bottom:8px}
    .gate p{color:var(--sub);font-size:14px;margin-bottom:18px}
    .gate .btn{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
    .hidden{display:none}
    @media (max-width:900px){ .stats{grid-template-columns:repeat(3,1fr)} .charts{grid-template-columns:1fr} }
    @media (max-width:768px){ .wrap{padding:24px 14px} table{min-width:560px} }
    @media (max-width:460px){ .stats{grid-template-columns:repeat(2,1fr)} .filters input{min-width:0} }
  </style>
  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');
    function toggleTheme(){
      var h=document.documentElement, b=document.getElementById('themeBtn');
      if(h.classList.toggle('light')){localStorage.setItem('theme','light'); if(b)b.innerHTML='&#x2600;&#xFE0F;';}
      else{localStorage.setItem('theme','dark'); if(b)b.innerHTML='&#x1F319;';}
    }
  </script>
</head>
<body>
  <div class="top">
    <a class="wm" href="./index.html">SecureScope<sup>BETA</sup></a>
    <span class="badge">Admin</span>
    <div class="spacer"></div>
    <a class="btn" href="./index.html">&larr; Home</a>
    <span class="mono" id="who" style="color:var(--sub)"></span>
    <button class="btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">&#x1F319;</button>
    <button class="btn hidden" id="signout">Sign out</button>
  </div>

  <div class="wrap">
    <div class="gate" id="gate">
      <h2>Admin access required</h2>
      <p id="gateMsg">Sign in with an authorised admin account to view all user activity.</p>
      <button class="btn" id="signin">Sign in with Google</button>
    </div>

    <div id="panel" class="hidden">
      <h1>User activity &amp; statistics</h1>
      <div class="lead" id="lead">Across all SecureScope users.</div>
      <div class="stats" id="stats"></div>

      <div class="charts">
        <div class="card">
          <div class="h">Scans — last 14 days</div>
          <div class="bars" id="chartDays"></div>
        </div>
        <div class="card">
          <div class="h">Scans by type</div>
          <div class="tbar" id="chartTypes"></div>
        </div>
      </div>

      <div class="sec">Users</div>
      <div class="tbl-scroll"><table id="usersTbl"><thead><tr><th>Email</th><th>UID</th><th>Last active</th></tr></thead><tbody></tbody></table></div>

      <div class="sec">Scan activity</div>
      <div class="filters">
        <input id="q" type="search" placeholder="Search email or repository…" autocomplete="off">
        <select id="ftype"><option value="">All types</option></select>
        <select id="frange">
          <option value="1">Last 24 hours</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="0" selected>All time</option>
        </select>
        <span class="count" id="fcount"></span>
      </div>
      <div class="tbl-scroll"><table id="actTbl"><thead><tr><th>When</th><th>User</th><th>Repository</th><th>Type</th><th>Findings</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit }
      from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { firebaseConfig, ADMIN_EMAILS } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const $ = (id) => document.getElementById(id);
    const esc = (s) => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    $("signin").onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => $("gateMsg").textContent = e.message);
    $("signout").onclick = () => signOut(auth);

    let SCANS = [];  // all scan activity records

    onAuthStateChanged(auth, async (u) => {
      const isAdmin = u && ADMIN_EMAILS.includes((u.email||"").toLowerCase());
      $("who").textContent = u ? u.email : "";
      $("signout").classList.toggle("hidden", !u);
      if (!u) { $("gate").classList.remove("hidden"); $("panel").classList.add("hidden"); return; }
      if (!isAdmin) {
        $("gate").classList.remove("hidden"); $("panel").classList.add("hidden");
        $("gateMsg").textContent = "This account (" + u.email + ") is not an admin. Sign out and use an authorised account.";
        return;
      }
      $("gate").classList.add("hidden"); $("panel").classList.remove("hidden");
      await load();
    });

    const when = (a) => (a.createdAt && a.createdAt.toDate) ? a.createdAt.toDate() : null;

    async function load() {
      let users = [];
      try { const snap = await getDocs(collection(db, "users")); users = snap.docs.map(d => d.data()); }
      catch (e) { $("usersTbl").querySelector("tbody").innerHTML = `<tr><td colspan="3" style="color:#fca5a5">Cannot read users — ${esc(e.code||e.message)}</td></tr>`; }

      try {
        const snap = await getDocs(query(collection(db, "activity"), orderBy("createdAt", "desc"), limit(500)));
        SCANS = snap.docs.map(d => d.data()).filter(a => a.type === "scan");
      } catch (e) {
        $("actTbl").querySelector("tbody").innerHTML = `<tr><td colspan="5" style="color:#fca5a5">Cannot read activity — ${esc(e.code||e.message)}</td></tr>`;
      }

      // ── Summary stats ──────────────────────────────────────────────
      const totalFindings = SCANS.reduce((n, a) => n + (a.findings || 0), 0);
      const uniqRepos = new Set(SCANS.map(a => (a.repo||"").toLowerCase()).filter(Boolean)).size;
      const now = Date.now();
      const in7d = SCANS.filter(a => { const d = when(a); return d && now - d.getTime() < 7*864e5; }).length;
      const active24 = new Set(SCANS.filter(a => { const d = when(a); return d && now - d.getTime() < 864e5; }).map(a => a.email)).size;
      const avg = SCANS.length ? Math.round(totalFindings / SCANS.length) : 0;
      $("lead").textContent = `${users.length} user${users.length===1?"":"s"} · ${SCANS.length} scan${SCANS.length===1?"":"s"} recorded.`;
      $("stats").innerHTML = [
        ["Users", users.length],
        ["Total scans", SCANS.length],
        ["Unique repos", uniqRepos],
        ["Findings surfaced", totalFindings],
        ["Avg / scan", avg],
        ["Scans (7d)", in7d],
      ].map(([l,n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${esc(l)}</div></div>`).join("");

      // ── Chart: scans over last 14 days ─────────────────────────────
      const days = [];
      for (let i = 13; i >= 0; i--) { const d = new Date(now - i*864e5); days.push({ key: d.toLocaleDateString(undefined,{month:"numeric",day:"numeric"}), ts: new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(), count: 0 }); }
      SCANS.forEach(a => { const d = when(a); if (!d) return; const k = new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); const slot = days.find(x => x.ts === k); if (slot) slot.count++; });
      const maxDay = Math.max(1, ...days.map(d => d.count));
      $("chartDays").innerHTML = days.map(d => {
        const h = Math.round((d.count / maxDay) * 96);
        return `<div class="bar" title="${d.count} scans on ${esc(d.key)}"><span class="bv">${d.count||""}</span><div class="b" style="height:${h}px"></div><span class="bl">${esc(d.key)}</span></div>`;
      }).join("");

      // ── Chart: scans by type ───────────────────────────────────────
      const types = {};
      SCANS.forEach(a => { const t = a.scanType || "full"; types[t] = (types[t]||0)+1; });
      const typeEntries = Object.entries(types).sort((a,b)=>b[1]-a[1]);
      const maxType = Math.max(1, ...typeEntries.map(e=>e[1]));
      $("chartTypes").innerHTML = typeEntries.length ? typeEntries.map(([t,n]) =>
        `<div class="tbar-row"><span class="mono">${esc(t)}</span><div class="tbar-track"><div class="tbar-fill" style="width:${Math.round(n/maxType*100)}%"></div></div><span class="mono" style="text-align:right">${n}</span></div>`
      ).join("") : `<div style="color:var(--dim);font-size:13px">No scans yet.</div>`;

      // Populate the type filter
      const ftype = $("ftype");
      ftype.innerHTML = `<option value="">All types</option>` + typeEntries.map(([t]) => `<option value="${esc(t)}">${esc(t)}</option>`).join("");

      // ── Users table ────────────────────────────────────────────────
      $("usersTbl").querySelector("tbody").innerHTML = users.length ? users.map(u => {
        const la = u.lastActive && u.lastActive.toDate ? u.lastActive.toDate().toLocaleString() : "—";
        return `<tr><td>${esc(u.email)}</td><td class="mono">${esc(u.uid||"")}</td><td>${esc(la)}</td></tr>`;
      }).join("") : `<tr><td colspan="3" style="color:var(--dim)">No users yet.</td></tr>`;

      ["q","ftype","frange"].forEach(id => $(id).addEventListener("input", renderActivity));
      renderActivity();
    }

    function renderActivity() {
      const q = $("q").value.trim().toLowerCase();
      const type = $("ftype").value;
      const days = parseInt($("frange").value, 10);
      const now = Date.now();
      let rows = SCANS.filter(a => {
        if (type && (a.scanType||"full") !== type) return false;
        if (days) { const d = when(a); if (!d || now - d.getTime() > days*864e5) return false; }
        if (q) {
          const hay = ((a.email||"") + " " + (a.repo||"")).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      $("fcount").textContent = `${rows.length} of ${SCANS.length}`;
      $("actTbl").querySelector("tbody").innerHTML = rows.length ? rows.map(a => {
        const w = when(a) ? when(a).toLocaleString() : "—";
        return `<tr><td>${esc(w)}</td><td>${esc(a.email)}</td><td class="mono">${esc((a.repo||"").replace(/^https?:\/\//,""))}</td><td>${esc(a.scanType||"full")}</td><td>${esc(a.findings||0)}</td></tr>`;
      }).join("") : `<tr><td colspan="5" style="color:var(--dim)">No activity matches these filters.</td></tr>`;
    }

    if (document.documentElement.classList.contains('light')) $("themeBtn").innerHTML = '&#x2600;&#xFE0F;';
  </script>
</body>
</html>
