<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureScope — Shared Report (View Only)</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0a0c0f;--ink2:#111419;--ink3:#181c23;--rule:#252b35;--rule2:#2e3540;--muted:#6b7785;--dim:#6b7785;--sub:#a0aec0;--body:#e2e8f0;--head:#fff;--accent:#4f8ef7;--danger:#f25757;--warn:#e6a817;--ok:#3ecf79}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--ink);color:var(--body);font-family:'Geist',sans-serif;min-height:100vh;line-height:1.6}
    .top{height:52px;border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 24px;gap:12px}
    .wm{font-size:15px;font-weight:700;color:var(--head)} .wm sup{font-size:9px;color:var(--accent);vertical-align:top}
    .vobadge{font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted);border:1px solid var(--rule2);border-radius:6px;padding:3px 8px;text-transform:uppercase;letter-spacing:.6px}
    .wrap{max-width:820px;margin:0 auto;padding:48px 24px}
    .eye{font-size:11px;font-family:'Geist Mono',monospace;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}
    h1{font-size:28px;font-weight:900;color:var(--head);letter-spacing:-.5px;margin-bottom:6px}
    .repo{font-size:14px;color:var(--sub);font-family:'Geist Mono',monospace;margin-bottom:4px}
    .meta{font-size:12px;color:var(--dim);margin-bottom:28px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .card{background:var(--ink2);border:1px solid var(--rule);border-radius:12px;padding:20px;text-align:center}
    .num{font-size:30px;font-weight:800;font-family:'Geist Mono',monospace;line-height:1}
    .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:6px}
    .cta{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border-radius:10px;padding:13px 24px;font-size:15px;font-weight:600;text-decoration:none}
    .msg{padding:40px;text-align:center;color:var(--dim)}
    a{color:var(--accent)}
  </style>
</head>
<body>
  <div class="top"><span class="wm">SecureScope<sup>BETA</sup></span><span class="vobadge">View only</span></div>
  <div class="wrap" id="wrap"><div class="msg">Loading shared report…</div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const db = getFirestore(initializeApp(firebaseConfig));
    const id = new URLSearchParams(location.search).get("id");
    const wrap = document.getElementById("wrap");

    function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

    (async () => {
      if (!id) { wrap.innerHTML = '<div class="msg">No report id in this link.</div>'; return; }
      let snap;
      try { snap = await getDoc(doc(db, "shared", id)); }
      catch (e) { wrap.innerHTML = '<div class="msg">Could not load this report.</div>'; return; }
      if (!snap.exists()) { wrap.innerHTML = '<div class="msg">This shared report no longer exists.</div>'; return; }
      const r = snap.data();
      const s = r.summary || {}; const sev = s.by_severity || {};
      const crit = sev.ERROR||0, warn = sev.WARNING||0, cve = s.dependency_vulns||0;
      const total = (s.total_findings!=null)?s.total_findings:(crit+warn);
      const when = r.createdAt && r.createdAt.toDate ? r.createdAt.toDate().toLocaleString() : "";
      const link = r.gist_url || r.report_url || "";
      wrap.innerHTML = `
        <div class="eye">Shared Security Report</div>
        <h1>Static Analysis &amp; Threat Assessment</h1>
        <div class="repo">${esc((r.repo||"").replace(/^https?:\/\//,""))}</div>
        <div class="meta">Shared by ${esc(r.ownerEmail||"a SecureScope user")}${when?" · "+esc(when):""}</div>
        <div class="grid">
          <div class="card"><div class="num" style="color:var(--danger)">${crit}</div><div class="lbl">Critical</div></div>
          <div class="card"><div class="num" style="color:var(--warn)">${warn}</div><div class="lbl">Warnings</div></div>
          <div class="card"><div class="num" style="color:var(--accent)">${cve}</div><div class="lbl">Dep. CVEs</div></div>
          <div class="card"><div class="num" style="color:var(--head)">${total}</div><div class="lbl">Total Findings</div></div>
        </div>
        ${link?`<a class="cta" href="${esc(link)}" target="_blank" rel="noopener">Open full report →</a>`:'<div class="msg">The full report link is unavailable.</div>'}
      `;
    })();
  </script>
</body>
</html>
